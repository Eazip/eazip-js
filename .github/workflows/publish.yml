name: Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        default: '@eazip/client'
        type: choice
        options:
          - '@eazip/client'
      npm_tag:
        description: npm dist-tag to publish with
        required: true
        default: beta
        type: choice
        options:
          - beta
          - latest

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ inputs.package }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Require main branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Publish workflow must be run from main, got ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Validate release metadata
        id: release
        run: npm run release:info
        env:
          RELEASE_PACKAGE: ${{ inputs.package }}
          NPM_TAG: ${{ inputs.npm_tag }}

      - name: Check release tag does not exist
        run: |
          if git rev-parse "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists locally"
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists on origin"
            exit 1
          fi
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}

      - name: Check npm version does not exist
        run: |
          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${VERSION} is already published"
            exit 1
          fi
        env:
          PACKAGE_NAME: ${{ steps.release.outputs.package_name }}
          VERSION: ${{ steps.release.outputs.version }}

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Validate package imports
        run: npm run test:package-imports

      - name: Validate package contents
        run: npm run pack:dry-run

      - name: Publish client
        run: npm publish -w "${{ steps.release.outputs.package_name }}" --tag "${{ inputs.npm_tag }}"

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG_NAME}" -m "${TAG_NAME}"
          git push origin "refs/tags/${TAG_NAME}"
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          VERSION: ${{ steps.release.outputs.version }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        run: |
          args=(
            "$TAG_NAME"
            --title "@eazip/client $VERSION"
            --notes "Published @eazip/client@$VERSION to npm with dist-tag ${{ inputs.npm_tag }}."
          )
          if [ "$PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}"
